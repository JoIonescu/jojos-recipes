var SYSTEM = ‘You are a recipe extraction assistant. Return ONLY a valid JSON object, no markdown, no fences. Structure: {“name”:“Recipe Name”,“category”:“Main/Dessert/Breakfast/Snack/Soup/Salad”,“cuisine”:“Italian/French/Asian/etc”,“servings”:4,“prepTime”:“15 min”,“cookTime”:“30 min”,“ingredients”:[“item 1”,“item 2”],“steps”:[“First step”,“Second step”],“notes”:“Optional original tips”}’;

function callClaude(messages, apiKey) {
return fetch(‘https://api.anthropic.com/v1/messages’, {
method: ‘POST’,
headers: {
‘Content-Type’: ‘application/json’,
‘x-api-key’: apiKey,
‘anthropic-version’: ‘2023-06-01’,
‘anthropic-dangerous-direct-browser-access’: ‘true’
},
body: JSON.stringify({ model:‘claude-sonnet-4-20250514’, max_tokens:1500, system:SYSTEM, messages:messages })
}).then(function(res) { return res.json(); }).then(function(data) {
if (data.error) throw new Error(data.error.message);
var texts = (data.content || []).filter(function(b){ return b.type === ‘text’; });
if (!texts.length) throw new Error(‘Empty response’);
return texts.map(function(b){ return b.text; }).join(’’);
});
}

function extractFromURL(url, apiKey) {
return fetch(‘https://r.jina.ai/’ + url, { headers:{‘Accept’:‘text/plain’} })
.then(function(res) {
if (!res.ok) throw new Error(‘Cannot fetch page’);
return res.text();
}).then(function(pageText) {
return callClaude([{ role:‘user’, content:‘Extract the recipe from this webpage:\n\n’ + pageText.slice(0, 12000) }], apiKey);
}).then(function(raw) {
return JSON.parse(raw.replace(/`json|`/g,’’).trim());
});
}

function extractFromImage(b64, mime, apiKey) {
return callClaude([{ role:‘user’, content:[
{ type:‘image’, source:{ type:‘base64’, media_type:mime, data:b64 } },
{ type:‘text’,  text:‘Extract the recipe from this image.’ }
]}], apiKey).then(function(raw) {
return JSON.parse(raw.replace(/`json|`/g,’’).trim());
});
}

function compressImage(file) {
return new Promise(function(resolve, reject) {
var reader = new FileReader();
reader.onload = function(ev) {
var img = new Image();
img.onload = function() {
var MAX = 800, w = img.width, h = img.height;
if (w > h) { if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; } }
else        { if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; } }
var canvas = document.createElement(‘canvas’);
canvas.width = w; canvas.height = h;
canvas.getContext(‘2d’).drawImage(img, 0, 0, w, h);
resolve(canvas.toDataURL(‘image/jpeg’, 0.72));
};
img.onerror = reject;
img.src = ev.target.result;
};
reader.onerror = reject;
reader.readAsDataURL(file);
});
}

function readFileAsBase64(file) {
return new Promise(function(resolve, reject) {
var fr = new FileReader();
fr.onload = function() { resolve(fr.result.split(’,’)[1]); };
fr.onerror = reject;
fr.readAsDataURL(file);
});
}
