<div id="root"></div>

<script>
  // ── PWA manifest (injected dynamically) ──────────────────────────────────
  const manifest = {
    name: "Jojo's Recipes",
    short_name: "Jojo's Recipes",
    start_url: "./",
    display: "standalone",
    background_color: "#f5f0e8",
    theme_color: "#2c2416",
    icons: [
      { src: "icon.svg", sizes: "any", type: "image/svg+xml", purpose: "any maskable" }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], { type: "application/json" });
  const mLink = document.createElement("link");
  mLink.rel = "manifest";
  mLink.href = URL.createObjectURL(blob);
  document.head.appendChild(mLink);

  // ── Service Worker ────────────────────────────────────────────────────────
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }
</script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Storage (localStorage) ─────────────────────────────────────────────────
const DB_KEY   = "jojos-recipes-v1";
const KEY_KEY  = "jojos-api-key";

function loadRecipes() {
  try { return JSON.parse(localStorage.getItem(DB_KEY) || "[]"); } catch { return []; }
}
function saveRecipes(list) {
  const sorted = [...list].sort((a, b) => a.name.localeCompare(b.name));
  localStorage.setItem(DB_KEY, JSON.stringify(sorted));
  return sorted;
}

// ── Anthropic API ──────────────────────────────────────────────────────────
const SYSTEM = `You are a recipe extraction assistant. Return ONLY a valid JSON object — no markdown fences, no explanation. Use exactly:
{
  "name": "Recipe Name",
  "category": "Main / Dessert / Breakfast / Snack / Soup / Salad / etc.",
  "cuisine": "Italian / French / Asian / etc.",
  "servings": 4,
  "prepTime": "15 min",
  "cookTime": "30 min",
  "ingredients": ["200g flour", "2 eggs"],
  "steps": ["Step description one", "Step description two"],
  "notes": "Optional tips or substitutions"
}`;

async function callClaude(messages, apiKey, useSearch = false) {
  let msgs = [...messages];

  for (let round = 0; round < 6; round++) {
    const body = {
      model: "claude-sonnet-4-20250514",
      max_tokens: 1500,
      system: SYSTEM,
      messages: msgs,
    };
    if (useSearch) body.tools = [{ type: "web_search_20250305", name: "web_search" }];

    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify(body),
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    // End turn with text → return it
    const texts = (data.content || []).filter(b => b.type === "text");
    if (data.stop_reason === "end_turn" && texts.length) {
      return texts.map(b => b.text).join("");
    }

    // Tool use round → continue
    if (data.stop_reason === "tool_use") {
      msgs.push({ role: "assistant", content: data.content });
      const results = (data.content || [])
        .filter(b => b.type === "tool_use")
        .map(b => ({ type: "tool_result", tool_use_id: b.id, content: "done" }));
      msgs.push({ role: "user", content: results });
      continue;
    }

    // Fallback
    if (texts.length) return texts.map(b => b.text).join("");
    throw new Error("Unexpected API response");
  }
  throw new Error("Too many rounds");
}

async function extractFromURL(url, apiKey) {
  const raw = await callClaude(
    [{ role: "user", content: `Fetch and extract the recipe from this URL: ${url}` }],
    apiKey, true
  );
  return JSON.parse(raw.replace(/```json|```/g, "").trim());
}

async function extractFromImage(b64, mime, apiKey) {
  const raw = await callClaude(
    [{
      role: "user",
      content: [
        { type: "image", source: { type: "base64", media_type: mime, data: b64 } },
        { type: "text", text: "Extract the recipe from this image." },
      ],
    }],
    apiKey, false
  );
  return JSON.parse(raw.replace(/```json|```/g, "").trim());
}

// ── App ─────────────────────────────────────────────────────────────────────
export default function App() {
  const [apiKey, setApiKey]     = useState(() => localStorage.getItem(KEY_KEY) || "");
  const [setupDone, setSetup]   = useState(() => !!localStorage.getItem(KEY_KEY));
  const [recipes, setRecipes]   = useState(loadRecipes);
  const [view, setView]         = useState("list");   // list | add | preview | detail
  const [selected, setSelected] = useState(null);
  const [search, setSearch]     = useState("");
  const [url, setUrl]           = useState("");
  const [loading, setLoading]   = useState(false);
  const [loadMsg, setLoadMsg]   = useState("");
  const [error, setError]       = useState("");
  const [preview, setPreview]   = useState(null);
  const [keyInput, setKeyInput] = useState("");
  const fileRef = useRef();

  function persist(list) {
    const sorted = saveRecipes(list);
    setRecipes(sorted);
    return sorted;
  }

  function saveKey() {
    if (!keyInput.trim()) return;
    localStorage.setItem(KEY_KEY, keyInput.trim());
    setApiKey(keyInput.trim());
    setSetup(true);
  }

  async function handleURL() {
    if (!url.trim()) return;
    setLoading(true); setError(""); setLoadMsg("Fetching recipe…");
    try {
      const r = await extractFromURL(url.trim(), apiKey);
      r.id = Date.now().toString(); r.source = url.trim(); r.addedAt = new Date().toISOString();
      setPreview(r); setView("preview");
    } catch (e) { setError("Couldn't extract from that link. Check the URL or try another."); }
    setLoading(false); setLoadMsg("");
  }

  async function handleImage(e) {
    const file = e.target.files[0]; if (!file) return;
    setLoading(true); setError(""); setLoadMsg("Reading recipe from photo…");
    try {
      const b64 = await new Promise((res, rej) => {
        const fr = new FileReader(); fr.onload = () => res(fr.result.split(",")[1]); fr.onerror = rej; fr.readAsDataURL(file);
      });
      const r = await extractFromImage(b64, file.type, apiKey);
      r.id = Date.now().toString(); r.source = "Photo"; r.addedAt = new Date().toISOString();
      setPreview(r); setView("preview");
    } catch (e) { setError("Couldn't read the recipe from that photo."); }
    setLoading(false); setLoadMsg(""); e.target.value = "";
  }

  function confirmSave() {
    const sorted = persist([...recipes, preview]);
    setSelected(preview); setPreview(null); setUrl(""); setView("detail");
  }

  function deleteRecipe(id) {
    persist(recipes.filter(r => r.id !== id));
    setView("list"); setSelected(null);
  }

  // Grouped list
  const filtered = recipes.filter(r => {
    const q = search.toLowerCase();
    return r.name.toLowerCase().includes(q) ||
      (r.cuisine || "").toLowerCase().includes(q) ||
      (r.category || "").toLowerCase().includes(q);
  });
  const grouped = {};
  filtered.forEach(r => {
    const l = r.name[0]?.toUpperCase() || "#";
    if (!grouped[l]) grouped[l] = [];
    grouped[l].push(r);
  });
  const letters = Object.keys(grouped).sort();

  // ── Setup screen ───────────────────────────────────────────────────────
  if (!setupDone) return (
    <div style={s.setup}>
      <div style={s.setupCard}>
        <div style={s.setupEmoji}>🍳</div>
        <div style={s.setupTitle}>Jojo's Recipes</div>
        <div style={s.setupSub}>
          To extract recipes from links and photos, paste your <strong>Anthropic API key</strong> below.
          <br /><br />
          Get a free key at <a href="https://console.anthropic.com" target="_blank" style={{color:"#c4854a"}}>console.anthropic.com</a> → API Keys.
        </div>
        <input
          style={s.keyInput}
          type="password"
          placeholder="sk-ant-..."
          value={keyInput}
          onChange={e => setKeyInput(e.target.value)}
          onKeyDown={e => e.key === "Enter" && saveKey()}
        />
        <button style={s.keyBtn} onClick={saveKey} disabled={!keyInput.trim()}>
          Get started →
        </button>
      </div>
    </div>
  );

  return (
    <div style={s.app}>
      {/* Loading */}
      {loading && (
        <div style={s.overlay}>
          <div style={s.spinner} />
          <div style={s.overlayText}>{loadMsg}</div>
        </div>
      )}

      {/* ── HEADER ── */}
      <div style={s.header}>
        <div style={s.headerLeft}>
          <span style={s.logo}>Jojo's <span style={{color:"#c4854a"}}>Recipes</span></span>
          {view === "list" && recipes.length > 0 &&
            <span style={s.badge}>{recipes.length}</span>}
        </div>
        {view === "list"
          ? <button style={s.addBtn} onClick={() => { setView("add"); setError(""); setUrl(""); }}>+ Add</button>
          : <button style={s.backBtn} onClick={() => { setView("list"); setPreview(null); setError(""); }}>← Back</button>
        }
      </div>

      {/* ── LIST ── */}
      {view === "list" && <>
        <div style={s.searchWrap}>
          <input style={s.searchInput} placeholder="Search recipes, cuisines…"
            value={search} onChange={e => setSearch(e.target.value)} />
        </div>
        <div style={s.listBody}>
          {recipes.length === 0 && (
            <div style={s.empty}>
              <div style={{fontSize:52,marginBottom:16}}>🍽️</div>
              <div style={s.emptyTitle}>Your recipe book is empty</div>
              <div style={s.emptySub}>Tap <strong>+ Add</strong> and paste a link<br />or upload a photo.</div>
            </div>
          )}
          {recipes.length > 0 && filtered.length === 0 && (
            <div style={s.empty}>
              <div style={{fontSize:36,marginBottom:12}}>🔍</div>
              <div style={s.emptyTitle}>No matches</div>
            </div>
          )}
          {letters.map(l => (
            <div key={l}>
              <div style={s.letterHead}>{l}</div>
              {grouped[l].map(r => (
                <div key={r.id} style={s.row} onClick={() => { setSelected(r); setView("detail"); }}>
                  <div style={{flex:1}}>
                    <div style={s.rowName}>{r.name}</div>
                    {(r.cuisine || r.category) &&
                      <div style={s.rowMeta}>{[r.cuisine, r.category].filter(Boolean).join(" · ")}</div>}
                  </div>
                  <div style={s.rowArrow}>›</div>
                </div>
              ))}
            </div>
          ))}
        </div>
      </>}

      {/* ── ADD ── */}
      {view === "add" && (
        <div style={s.panel}>
          <div style={s.panelTitle}>Add a Recipe</div>
          <div style={s.panelSub}>Paste a link from any cooking site, or upload a photo of a recipe card.</div>

          <div style={s.card}>
            <div style={s.cardTitle}>🔗 From a URL</div>
            <div style={{display:"flex",gap:8}}>
              <input style={s.urlInput} placeholder="https://…" value={url}
                onChange={e => setUrl(e.target.value)} onKeyDown={e => e.key==="Enter" && handleURL()} />
              <button style={{...s.goBtn, opacity: loading||!url.trim()?0.5:1}}
                onClick={handleURL} disabled={loading || !url.trim()}>Go</button>
            </div>
          </div>

          <div style={s.card}>
            <div style={s.cardTitle}>📷 From a Photo</div>
            <div style={s.dropZone} onClick={() => fileRef.current.click()}>
              <div style={{fontSize:32,marginBottom:6}}>📸</div>
              <div style={{fontSize:15,color:"#8a7a62"}}>Tap to choose a photo</div>
              <div style={{fontSize:13,color:"#b0a390",marginTop:4}}>Recipe cards, screenshots, handwritten notes</div>
            </div>
            <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleImage} />
          </div>

          {error && <div style={s.errorBox}>⚠️ {error}</div>}
        </div>
      )}

      {/* ── PREVIEW ── */}
      {view === "preview" && preview && (
        <div>
          <div style={s.previewBanner}>✓ Recipe extracted — review before saving</div>
          <div style={s.panel}>
            <RecipeCard recipe={preview} />
            <div style={{display:"flex",gap:10,marginTop:20}}>
              <button style={s.confirmBtn} onClick={confirmSave}>Save to my book</button>
              <button style={s.discardBtn} onClick={() => { setView("add"); setPreview(null); }}>Discard</button>
            </div>
          </div>
        </div>
      )}

      {/* ── DETAIL ── */}
      {view === "detail" && selected && (
        <div>
          <div style={s.detailHeader}>
            <div style={s.detailName}>{selected.name}</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:7,marginTop:10}}>
              {selected.cuisine  && <Pill accent>{selected.cuisine}</Pill>}
              {selected.category && <Pill>{selected.category}</Pill>}
              {selected.servings && <Pill>🍽 {selected.servings} servings</Pill>}
              {selected.prepTime && <Pill>⏱ Prep {selected.prepTime}</Pill>}
              {selected.cookTime && <Pill>🔥 Cook {selected.cookTime}</Pill>}
            </div>
          </div>
          <div style={s.detailBody}>
            <RecipeCard recipe={selected} slim />
            {selected.source && selected.source !== "Photo" &&
              <div style={s.sourceLink}>Source: <a href={selected.source} target="_blank" style={{color:"#c4854a"}}>{selected.source}</a></div>}
            <button style={s.deleteBtn} onClick={() => deleteRecipe(selected.id)}>🗑 Remove recipe</button>
          </div>
        </div>
      )}
    </div>
  );
}

function Pill({ children, accent }) {
  return (
    <span style={{
      background: accent ? "#c4854a" : "rgba(255,255,255,0.15)",
      color: accent ? "#fff" : "#c9bfae",
      padding: "4px 12px", borderRadius: 20, fontSize: 13, letterSpacing: "0.03em"
    }}>{children}</span>
  );
}

function RecipeCard({ recipe, slim }) {
  return (
    <div>
      {!slim && (
        <div style={{marginBottom:18}}>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:600}}>{recipe.name}</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:7,marginTop:8}}>
            {recipe.cuisine  && <span style={tagStyle("#c4854a","#fff")}>{recipe.cuisine}</span>}
            {recipe.category && <span style={tagStyle("#ede7d8","#5a4e3a")}>{recipe.category}</span>}
            {recipe.servings && <span style={tagStyle("#ede7d8","#5a4e3a")}>🍽 {recipe.servings} servings</span>}
            {recipe.prepTime && <span style={tagStyle("#ede7d8","#5a4e3a")}>⏱ {recipe.prepTime}</span>}
            {recipe.cookTime && <span style={tagStyle("#ede7d8","#5a4e3a")}>🔥 {recipe.cookTime}</span>}
          </div>
        </div>
      )}

      {recipe.ingredients?.length > 0 && <>
        <SectionTitle>Ingredients</SectionTitle>
        {recipe.ingredients.map((ing, i) => (
          <div key={i} style={s.ingRow}><span style={{color:"#c4854a",fontSize:20,lineHeight:1}}>·</span>{ing}</div>
        ))}
      </>}

      {recipe.steps?.length > 0 && <>
        <SectionTitle>Preparation</SectionTitle>
        {recipe.steps.map((step, i) => (
          <div key={i} style={s.stepRow}>
            <span style={s.stepNum}>{i+1}</span>
            <span style={{lineHeight:1.7}}>{step.replace(/^Step\s*\d+[:.]\s*/i,"")}</span>
          </div>
        ))}
      </>}

      {recipe.notes && <>
        <SectionTitle>Notes</SectionTitle>
        <div style={s.notesBox}>{recipe.notes}</div>
      </>}
    </div>
  );
}

function SectionTitle({ children }) {
  return (
    <div style={{
      fontFamily:"'Cormorant Garamond',serif", fontSize:13, fontWeight:600,
      letterSpacing:"0.18em", textTransform:"uppercase", color:"#c4854a",
      marginTop:22, marginBottom:10, paddingBottom:6,
      borderBottom:"1px solid #e8e0d0"
    }}>{children}</div>
  );
}

function tagStyle(bg, color) {
  return { background:bg, color, padding:"4px 12px", borderRadius:20, fontSize:13 };
}

// ── Styles ──────────────────────────────────────────────────────────────────
const s = {
  app: { minHeight:"100vh", background:"#f5f0e8", paddingBottom:40 },

  // Setup
  setup: { minHeight:"100vh", background:"#2c2416", display:"flex", alignItems:"center", justifyContent:"center", padding:24 },
  setupCard: { background:"#f5f0e8", borderRadius:16, padding:32, maxWidth:380, width:"100%", textAlign:"center" },
  setupEmoji: { fontSize:52, marginBottom:12 },
  setupTitle: { fontFamily:"'Cormorant Garamond',serif", fontSize:30, fontWeight:600, marginBottom:14 },
  setupSub: { fontSize:16, color:"#8a7a62", lineHeight:1.6, marginBottom:24 },
  keyInput: {
    width:"100%", border:"1.5px solid #d6cbb8", borderRadius:8, padding:"12px 14px",
    fontFamily:"'Crimson Pro',serif", fontSize:15, marginBottom:14, outline:"none",
    background:"#fff"
  },
  keyBtn: {
    width:"100%", background:"#c4854a", color:"#fff", border:"none", borderRadius:8,
    padding:"13px", fontFamily:"'Cormorant Garamond',serif", fontSize:18, cursor:"pointer"
  },

  // Header
  header: {
    background:"#2c2416", padding:"16px 24px", display:"flex", alignItems:"center",
    justifyContent:"space-between", position:"sticky", top:0, zIndex:50
  },
  headerLeft: { display:"flex", alignItems:"baseline", gap:10 },
  logo: { fontFamily:"'Cormorant Garamond',serif", fontSize:24, fontWeight:600, color:"#e8d9b8" },
  badge: {
    background:"#c4854a", color:"#fff", fontSize:11, padding:"2px 8px", borderRadius:10
  },
  addBtn: {
    background:"#c4854a", color:"#fff", border:"none", borderRadius:6,
    padding:"8px 16px", fontFamily:"'Crimson Pro',serif", fontSize:15, cursor:"pointer"
  },
  backBtn: {
    background:"none", border:"none", color:"#8a7a62", fontFamily:"'Crimson Pro',serif",
    fontSize:15, cursor:"pointer"
  },

  // Search
  searchWrap: { padding:"14px 24px", background:"#ede7d8", borderBottom:"1px solid #d6cbb8" },
  searchInput: {
    width:"100%", background:"#fff", border:"1.5px solid #d6cbb8", borderRadius:8,
    padding:"10px 14px", fontFamily:"'Crimson Pro',serif", fontSize:16, outline:"none"
  },

  // List
  listBody: { paddingBottom:40 },
  letterHead: {
    fontFamily:"'Cormorant Garamond',serif", fontSize:12, fontWeight:600,
    letterSpacing:"0.2em", textTransform:"uppercase", color:"#c4854a",
    padding:"14px 24px 4px"
  },
  row: {
    display:"flex", alignItems:"center", padding:"13px 24px",
    borderBottom:"1px solid #e8e0d0", cursor:"pointer"
  },
  rowName: { fontFamily:"'Cormorant Garamond',serif", fontSize:19, fontWeight:500 },
  rowMeta: { fontSize:13, color:"#8a7a62", marginTop:2 },
  rowArrow: { color:"#c4854a", fontSize:22 },

  // Empty
  empty: { textAlign:"center", padding:"60px 24px", color:"#8a7a62" },
  emptyTitle: { fontFamily:"'Cormorant Garamond',serif", fontSize:22, color:"#2c2416", marginBottom:8 },
  emptySub: { fontSize:16, lineHeight:1.6 },

  // Add panel
  panel: { padding:24, maxWidth:600, margin:"0 auto" },
  panelTitle: { fontFamily:"'Cormorant Garamond',serif", fontSize:26, fontWeight:600, marginBottom:6 },
  panelSub: { fontSize:15, color:"#8a7a62", marginBottom:24, lineHeight:1.5 },
  card: { background:"#fff", border:"1.5px solid #d6cbb8", borderRadius:10, padding:20, marginBottom:14 },
  cardTitle: { fontFamily:"'Cormorant Garamond',serif", fontSize:17, fontWeight:600, marginBottom:12 },
  urlInput: {
    flex:1, border:"1.5px solid #d6cbb8", borderRadius:6, padding:"10px 12px",
    fontFamily:"'Crimson Pro',serif", fontSize:15, outline:"none"
  },
  goBtn: {
    background:"#2c2416", color:"#e8d9b8", border:"none", borderRadius:6,
    padding:"10px 18px", fontFamily:"'Crimson Pro',serif", fontSize:15, cursor:"pointer"
  },
  dropZone: {
    border:"2px dashed #d6cbb8", borderRadius:8, padding:24, textAlign:"center", cursor:"pointer"
  },
  errorBox: {
    background:"#fdf0e8", border:"1px solid #e8b48a", borderRadius:6,
    padding:"12px 14px", fontSize:14, color:"#8a3a10", marginTop:12
  },

  // Preview banner
  previewBanner: {
    background:"#c4854a", color:"#fff", padding:"10px 20px",
    fontSize:13, letterSpacing:"0.06em", textTransform:"uppercase"
  },

  // Confirm/discard
  confirmBtn: {
    flex:1, background:"#2c2416", color:"#e8d9b8", border:"none", borderRadius:8,
    padding:13, fontFamily:"'Cormorant Garamond',serif", fontSize:17, cursor:"pointer"
  },
  discardBtn: {
    flex:1, background:"none", color:"#8a7a62", border:"1.5px solid #d6cbb8", borderRadius:8,
    padding:13, fontFamily:"'Cormorant Garamond',serif", fontSize:17, cursor:"pointer"
  },

  // Detail
  detailHeader: { background:"#2c2416", padding:"20px 24px" },
  detailName: { fontFamily:"'Cormorant Garamond',serif", fontSize:26, color:"#e8d9b8", fontWeight:600 },
  detailBody: { padding:"22px 24px 60px" },

  // Recipe card
  ingRow: { display:"flex", alignItems:"flex-start", gap:10, padding:"7px 0", fontSize:17, borderBottom:"1px solid #f0ebe0" },
  stepRow: { display:"flex", gap:14, padding:"9px 0", fontSize:17, borderBottom:"1px solid #f0ebe0", alignItems:"flex-start" },
  stepNum: { fontFamily:"'Cormorant Garamond',serif", fontSize:20, color:"#c4854a", fontWeight:600, minWidth:20 },
  notesBox: {
